  intl: ^0.19.0
  timezone: ^0.9.4
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.1
  home_widget: ^0.7.0
  fl_chart: ^0.69.0
  just_audio: ^0.9.40
  audio_service: ^0.18.14

dev_dependencies:
